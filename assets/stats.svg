<svg xmlns="http://www.w3.org/2000/svg" width="800" height="152" viewBox="0 0 800 152">
  <!-- background -->
  <rect fill="#0d1117" width="800" height="152"/>

  <!-- card 1: tests -->
  <rect fill="#161b22" x="0"   y="0" width="190" height="152" rx="8"/>

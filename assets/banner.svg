<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
  <defs>
    <linearGradient id="bg-g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="title-g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#bb9af7"/>
      <stop offset="60%" stop-color="#7aa2f7"/>
      <stop offset="100%" stop-color="#7dcfff"/>
    </linearGradient>
    <linearGradient id="accent-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bb9af7"/>
      <stop offset="100%" stop-color="#7aa2f7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect fill="url(#bg-g)" width="800" height="300" rx="12"/>

  <!-- Subtle grid -->
  <line x1="0" y1="100" x2="800" y2="100" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
  <line x1="267" y1="0" x2="267" y2="300" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>
  <line x1="533" y1="0" x2="533" y2="300" stroke="#ffffff" stroke-width="0.3" opacity="0.04"/>

  <!-- Left accent bar -->
  <rect fill="url(#accent-g)" x="60" y="80" width="3" height="140" rx="1.5"/>

  <!-- Title -->
  <text font-family="Menlo, Monaco, 'Courier New', monospace" font-size="46" font-weight="bold" fill="url(#title-g)" x="82" y="150" letter-spacing="-0.5">Claude Lead System</text>

  <!-- Subtitle -->
  <text font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" fill="#6e7681" x="82" y="182" letter-spacing="0.2">One control room for all your Claude Code terminals.</text>

  <!-- Stat pills -->
  <!-- 594 tests -->
  <rect fill="#0d1117" stroke="#30363d" stroke-width="1" x="82" y="216" width="96" height="26" rx="13"/>
  <text font-family="Menlo, Monaco, monospace" font-size="11" fill="#9ece6a" x="130" y="234" text-anchor="middle">594 tests</text>

  <!-- 48 tools -->
  <rect fill="#0d1117" stroke="#30363d" stroke-width="1" x="188" y="216" width="84" height="26" rx="13"/>
  <text font-family="Menlo, Monaco, monospace" font-size="11" fill="#7aa2f7" x="230" y="234" text-anchor="middle">48 tools</text>

  <!-- macOS -->
  <rect fill="#0d1117" stroke="#30363d" stroke-width="1" x="282" y="216" width="82" height="26" rx="13"/>
  <text font-family="Menlo, Monaco, monospace" font-size="11" fill="#9ece6a" x="323" y="234" text-anchor="middle">macOS ✓</text>

  <!-- Linux -->
  <rect fill="#0d1117" stroke="#30363d" stroke-width="1" x="374" y="216" width="76" height="26" rx="13"/>
  <text font-family="Menlo, Monaco, monospace" font-size="11" fill="#9ece6a" x="412" y="234" text-anchor="middle">Linux ✓</text>

  <!-- 0 coordination tokens -->
  <rect fill="#0d1117" stroke="#bb9af7" stroke-width="1" x="460" y="216" width="192" height="26" rx="13"/>
  <text font-family="Menlo, Monaco, monospace" font-size="11" fill="#bb9af7" x="556" y="234" text-anchor="middle">0 coordination tokens</text>

  <!-- Decorative terminal prompt (dim, bottom-right) -->
  <text font-family="Menlo, Monaco, monospace" font-size="12" fill="#bb9af7" opacity="0.12" x="638" y="148">❯ /lead</text>
  <text font-family="Menlo, Monaco, monospace" font-size="12" fill="#9ece6a" opacity="0.12" x="638" y="166">✓ Lead — Online</text>
  <text font-family="Menlo, Monaco, monospace" font-size="12" fill="#f7768e" opacity="0.12" x="638" y="184">⚠ CONFLICT detected</text>
  <text font-family="Menlo, Monaco, monospace" font-size="12" fill="#7aa2f7" opacity="0.12" x="638" y="202">→ terminals notified</text>

  <!-- Bottom border accent line -->
  <rect fill="url(#title-g)" x="0" y="297" width="800" height="3" rx="0"/>
  <rect fill="url(#title-g)" x="0" y="297" width="800" height="3" rx="1.5"/>
</svg>

name: supply-chain-policy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  policy-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
      - name: Workflow action pinning
        run: node scripts/policy/check-workflow-action-pinning.mjs
      - name: Release artifact contract
        run: node scripts/policy/check-release-artifact-contract.mjs
      - name: API contract sync
        run: node scripts/policy/check-api-contract-sync.mjs
      - name: Security review checklist gate
        run: node scripts/policy/check-security-review-gate.mjs
      - name: Changelog consistency gate
        run: node scripts/policy/check-changelog-consistency.mjs

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-shell:
    name: Lint shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck
      - name: Lint hooks
        run: shellcheck hooks/*.sh

  lint-python:
    name: Lint Python hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - name: Check syntax
        run: |
          python3 -m py_compile hooks/token-guard.py
          python3 -m py_compile hooks/read-efficiency-guard.py
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check hooks/*.py --ignore E501

  lint-js:
    name: Lint MCP coordinator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mcp-coordinator/package-lock.json
      - name: Install deps
        run: cd mcp-coordinator && npm ci
      - name: Check syntax
        run: node --check mcp-coordinator/index.js
      - name: Run coordinator unit tests
        run: cd mcp-coordinator && npm run test:unit

  coverage:
    name: Test Coverage (80%+ gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mcp-coordinator/package-lock.json
      - name: Install deps
        run: cd mcp-coordinator && npm ci
      - name: Run tests with coverage gate (80% lines)
        working-directory: mcp-coordinator
        run: npm run test:coverage
      - name: Generate coverage report
        if: always()
        working-directory: mcp-coordinator
        run: npm run test:coverage:report || true
      - name: Verify README coverage claim matches gate/report
        if: always()
        run: node scripts/check-coverage-claim.mjs
      - uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4
        if: always()
        with:
          name: coverage
          path: mcp-coordinator/coverage/

  perf-gate:
    name: Coordinator Performance Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mcp-coordinator/package-lock.json
      - name: Install deps
        run: cd mcp-coordinator && npm ci
      - name: Enforce benchmark thresholds
        run: node tests/perf-gate.mjs

  native-bridge:
    name: Native Bridge Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mcp-coordinator/package-lock.json
      - name: Install deps
        run: cd mcp-coordinator && npm ci
      - name: Run native bridge tests (queue, TTL, depth, drain, resume)
        run: cd mcp-coordinator && node --test test/native-bridge.test.mjs

  coordinator-e2e:
    name: Coordinator E2E (worker + pipeline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mcp-coordinator/package-lock.json
      - name: Install deps
        run: cd mcp-coordinator && npm ci
      - name: Run worker/pipeline lifecycle tests
        run: cd mcp-coordinator && npm run test:e2e

  sidecar-tests:
    name: Sidecar unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - name: Install sidecar deps
        run: npm ci
      - name: Typecheck sidecar
        run: npm --workspace sidecar run typecheck
      - name: Run sidecar tests
        run: npm --workspace sidecar test

  mode-path-lint:
    name: Lint mode file paths
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Verify all agent-referenced paths exist
        run: bash tests/mode-path-lint.sh

  integration-tests:
    name: Hook integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - name: Install pytest
        run: pip install pytest
      - name: Run hook smoke tests
        run: bash tests/hooks-smoke.sh
      - name: Run shell hook unit tests
        run: bash tests/test-hooks.sh
      - name: Run Python hook unit tests
        run: pytest tests/ -v
      - name: Run health-check regression tests
        run: bash tests/health-check-regression.sh

  platform-matrix:
    name: Platform Launch Matrix (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mcp-coordinator/package-lock.json
      - name: Install deps
        run: cd mcp-coordinator && npm ci
      - name: Run coordinator unit tests
        run: cd mcp-coordinator && npm run test:unit

  platform-proof:
    name: Platform Proof Matrix (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform_id: linux
          - os: macos-latest
            platform_id: macos
          - os: windows-latest
            platform_id: windows
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - name: Install jq (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Install jq (macOS)
        if: runner.os == 'macOS'
        run: brew install jq || true
      - name: Install jq (Windows)
        if: runner.os == 'Windows'
        run: choco install jq -y
      - name: Install workspace dependencies
        run: npm ci
      - name: Run platform proof suite
        run: node scripts/proof/run-platform-proof.mjs --platform-id ${{ matrix.platform_id }}
      - name: Upload platform proof artifacts
        if: always()
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4
        with:
          name: platform-proof-${{ matrix.platform_id }}
          path: |
            reports/compatibility/proofs/runs/${{ matrix.platform_id }}/
            reports/compatibility/proofs/latest/${{ matrix.platform_id }}.json

  compatibility-matrix:
    name: Compatibility Matrix (Node ${{ matrix.node }} / Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["18", "20"]
        python: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: ${{ matrix.node }}
          cache: "npm"
          cache-dependency-path: mcp-coordinator/package-lock.json
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python }}
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Install coordinator deps
        run: cd mcp-coordinator && npm ci
      - name: Run compatibility checks
        run: |
          python3 -m py_compile hooks/token-guard.py hooks/read-efficiency-guard.py
          node --check mcp-coordinator/index.js
          cd mcp-coordinator && npm run test:unit
      - name: Run hook smoke tests
        run: bash tests/hooks-smoke.sh

  smoke-install:
    name: Smoke Install (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"
      - name: Install jq (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Install jq (macOS)
        if: runner.os == 'macOS'
        run: brew install jq || true
      - name: Install jq (Windows)
        if: runner.os == 'Windows'
        run: choco install jq -y
      - name: Run smoke install
        shell: bash
        run: bash tests/smoke-install.sh --ref HEAD --mode full

  docs-audit:
    name: Docs audit (includes claim drift)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mcp-coordinator/package-lock.json
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - name: Install coordinator deps (for coverage/doc audits)
        run: cd mcp-coordinator && npm ci
      - name: Run docs audit gate
        run: npm run docs:audit

  cert-a-plus-main:
    name: A+ cert flow (canonical main only)
    if: github.event_name == 'push' && github.ref_name == 'main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - name: Install cert-flow dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck jq
          python3 -m pip install --upgrade pip pytest ruff
          npm ci
      - name: Run canonical A+ cert flow
        run: npm run cert:a-plus:fresh
      - name: Upload A+ cert artifact
        if: always()
        uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4
        with:
          name: a-plus-cert
          path: reports/a-plus-cert.json

  demo-assets:
    name: Demo asset freshness
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Check demo assets are current
        run: bash scripts/check-demo-assets.sh

  token-system-regression:
    name: Token System Regression Runner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mcp-coordinator/package-lock.json
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          python3 -m pip install --upgrade pip pytest
          cd mcp-coordinator && npm ci
      - name: Stage local runtime layout for regression runner
        run: |
          mkdir -p ~/.claude/hooks ~/.claude/mcp-coordinator ~/.claude/scripts ~/.claude/cost ~/.claude/terminals
          rsync -a hooks/ ~/.claude/hooks/
          rsync -a mcp-coordinator/ ~/.claude/mcp-coordinator/ --exclude node_modules
          cp -n scripts/run_token_system_regression.py ~/.claude/hooks/run_token_system_regression.py || true
      - name: Run token system regression
        run: |
          mkdir -p reports
          python3 scripts/run_token_system_regression.py > reports/token-system-regression-ci.json
      - name: Summarize regression result
        run: |
          python3 - <<'PY'
          import json
          d = json.load(open("reports/token-system-regression-ci.json"))
          print(json.dumps(d.get("summary", {}), indent=2))
          if d.get("summary", {}).get("failed", 0):
              raise SystemExit(1)
          PY
      - uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4
        if: always()
        with:
          name: token-system-regression
          path: reports/token-system-regression-ci.json

name: supply-chain

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write
  attestations: write

env:
  COSIGN_IDENTITY_REGEX: "^https://github.com/${{ github.repository }}/.github/workflows/supply-chain\\.yml@refs/tags/v[0-9]+\\.[0-9]+\\.[0-9]+([-.][A-Za-z0-9._-]+)?$"

jobs:
  sbom-and-provenance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build release bundle
        run: |
          OUTDIR="$(mktemp -d)"
          tar \
            --sort=name \
            --mtime='UTC 1970-01-01' \
            --owner=0 \
            --group=0 \
            --numeric-owner \
            --exclude .git \
            --exclude node_modules \
            -czf "$OUTDIR/claude-lead-system.tar.gz" .
          mv "$OUTDIR/claude-lead-system.tar.gz" .

      - name: Generate SBOM
        uses: anchore/sbom-action@57aae528053a48a3f6235f2d9461b05fbcb7366d # v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: supply-chain-artifacts
          path: |
            claude-lead-system.tar.gz
            sbom.spdx.json

      - name: Install cosign
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0

      - name: Sign release bundle (keyless)
        run: |
          cosign sign-blob --yes \
            --output-signature claude-lead-system.tar.gz.sig \
            --output-certificate claude-lead-system.tar.gz.pem \
            claude-lead-system.tar.gz

      - name: Verify release bundle signature
        run: |
          cosign verify-blob \
            --certificate claude-lead-system.tar.gz.pem \
            --signature claude-lead-system.tar.gz.sig \
            --certificate-identity-regexp "$COSIGN_IDENTITY_REGEX" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            claude-lead-system.tar.gz

      - name: Upload signature artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: signed-bundle
          path: |
            claude-lead-system.tar.gz.sig
            claude-lead-system.tar.gz.pem

      - name: Upload verification assets to GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            claude-lead-system.tar.gz \
            claude-lead-system.tar.gz.sig \
            claude-lead-system.tar.gz.pem \
            sbom.spdx.json \
            --clobber

      - name: Attest release bundle provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-path: claude-lead-system.tar.gz

name: token-management-benchmark-publish

on:
  workflow_dispatch:
  schedule:
    - cron: '0 14 * * 1'
  release:
    types: [published]

permissions:
  contents: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install coordinator deps
        run: |
          if [ -f mcp-coordinator/package-lock.json ]; then
            cd mcp-coordinator && npm ci
          fi
      - name: Run coordinator benchmark
        run: |
          mkdir -p bench/out
          node bench/coord-benchmark.mjs > bench/out/coord-benchmark.json
      - name: Build benchmark summary payload
        run: |
          python3 - <<'PY'
          import json, platform, subprocess, time, pathlib
          p = pathlib.Path('bench/out/coord-benchmark.json')
          try:
              bench = json.loads(p.read_text())
          except Exception:
              bench = {"raw": p.read_text(errors='ignore') if p.exists() else ""}
          out = {
              "generated_at": time.strftime('%Y-%m-%dT%H:%M:%SZ', time.gmtime()),
              "commit": subprocess.check_output(['git','rev-parse','HEAD'], text=True).strip(),
              "platform": platform.platform(),
              "python": platform.python_version(),
              "node": subprocess.check_output(['node','--version'], text=True).strip(),
              "coordinator_benchmark": bench,
          }
          pathlib.Path('bench/latest-results.json').write_text(json.dumps(out, indent=2) + '\n')
          print(json.dumps(out, indent=2))
          PY
      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: token-management-benchmarks
          path: |
            bench/out/coord-benchmark.json
            bench/latest-results.json
      - name: Commit latest benchmark snapshot (main only)
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add bench/latest-results.json
          git diff --cached --quiet && exit 0
          git commit -m "chore(bench): update latest benchmark snapshot"
          git push

name: release-bundle

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build release bundle
        run: |
          TAG="${GITHUB_REF_NAME:-manual}"
          OUTDIR="$(mktemp -d)"
          BUNDLE="$OUTDIR/claude-lead-system-${TAG}.tar.gz"
          tar --exclude .git -czf "$BUNDLE" .
          sha256sum "$BUNDLE" > "$OUTDIR/SHA256SUMS.txt"
          mv "$BUNDLE" .
          mv "$OUTDIR/SHA256SUMS.txt" .
      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: |
            claude-lead-system-*.tar.gz
            SHA256SUMS.txt
      - name: Attach bundle to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            claude-lead-system-*.tar.gz
            SHA256SUMS.txt
